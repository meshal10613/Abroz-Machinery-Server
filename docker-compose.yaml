services:
  mongo:
    image: mongo:7
    container_name: abroz-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: abroz-machinery-server
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
    environment:
      - CI=true
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: abroz-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  mongo_data: